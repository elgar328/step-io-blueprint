# Manually authored — pool grouping for the 130 pruned arenas.
# Pool names align with the step-io entity groups (geometry / topology /
# units / shape_rep / assembly_product / visualization / property / pmi /
# form_features) plus `plm` for product-lifecycle metadata (approval /
# person / organization / document / classification / role / date /
# context).
#
# Edit this file to redirect any arena to a different pool. The tool only
# validates that every arena in arenas_pruned.toml has an entry here
# (missing → Err) and that no entry refers to an unknown arena
# (extra → warning).

