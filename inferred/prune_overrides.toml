# Manually authored — keep specific entities through prune despite 0
# corpus instance count. Useful for ABSTRACT supertypes that have no
# direct STEP-file instances but serve as IR polymorphism roots, plus
# any entity that recasts.toml will reclassify into a unified enum.

# Abstract supertypes — IR polymorphism root (Curve/Surface enum_base)
[keep.curve]
reason = "IR polymorphism root for Curve enum — abstract supertype, 0 corpus instance. Direct children (line etc.) are currently single_struct so live-children count is 0; keep is required."

[keep.surface]
reason = "IR polymorphism root for Surface enum — abstract supertype, 0 corpus instance."

# Intermediate enum_bases with 0 corpus instance — initial unused-marking
# pass would otherwise prune them (their kept children come back, but the
# enum_base itself does not). bounded_surface is *not* listed: corpus
# regex hits the literal "BOUNDED_SURFACE" instance line, so it stays
# alive on its own.
