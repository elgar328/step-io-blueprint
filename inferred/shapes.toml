# 13 ConcreteSupertype entities — IR shape decision per Plan 3c.
#
# Shape options:
#   - shape = "carrier"        : enum E { Itself(EData), ChildA(...), ... }
#                                parent and children are equal-rank variants.
#   - shape = "base_parallel"  : struct E { ... } + enum EKind { ... }
#                                parent struct primary, kind enum is auxiliary axis.
#
# Counts in trailing comments are corpus instance counts at the time of
# initial decision (geometry-biased fixtures). Re-evaluate ratios after
# fixtures expansion. Children count = sum of instance_count over all
# entities whose VariantSpec is InEnum { enum_name = <this entity> }.

[entity.characterized_object]              # 90 self / 621 children, ratio 6.9
shape = "carrier"

[entity.face_bound]                        # 1.1M self / 3.6M children, ratio 3.3
shape = "carrier"

[entity.face_surface]                      # 495K self / 3.4M children, ratio 6.9
# step-io 매칭: parent attr (face_geometry, bounds) 가 모든 face variant
# 에서 빈번히 직접 접근 — Carrier 의 enum match 보다 BaseParallel 의
# struct field 가 API 친화. ratio 통계 (6.9) 의 default 결정과 사용자
# 디자인 선호의 불일치 자리 — override 의 본래 목적.
shape = "base_parallel"

[entity.manifold_solid_brep]               # 105K self / 759 children, ratio 0.0072 — parent dominant
