# ConcreteSupertype entities — IR shape decision per Plan 3c.
#
# Shape options:
#   - shape = "carrier"        : enum E { Itself(EData), ChildA(...), ... }
#                                parent and children are equal-rank variants.
#   - shape = "base_parallel"  : struct E { ... } + enum EKind { ... }
#                                parent struct primary, kind enum is auxiliary axis.
#
# Only TOP supertypes (no enclosing enum root) keep a shape entry. The prune
# middle-node flatten demotes any *instantiated* supertype that sits inside
# another enum to a flat InEnum member of its stable root, so those entities
# (face_surface, styled_item, manifold_solid_brep, datum_feature, ... — 14
# formerly here) no longer need a shape decision.
#
# Counts in trailing comments are corpus instance counts at the time of
# initial decision (geometry-biased fixtures). Children count = sum of
# instance_count over all entities whose VariantSpec is InEnum of this entity.

[entity.characterized_object]              # 90 self / 621 children, ratio 6.9
shape = "carrier"

[entity.product_category]                  # 10K self / 195K children, ratio 19.4
shape = "carrier"

[entity.product_definition_formation]      # 43K self / 152K children, ratio 3.5
shape = "carrier"

[entity.property_definition_representation] # 2K self / 195K children, ratio 87.6
shape = "carrier"

[entity.representation_context]            # 96K self / 191K children, ratio 1.99
shape = "carrier"

[entity.representation_map]                # 882 self / 0 children — children 미등장
shape = "carrier"

[entity.representation_relationship]       # 42 self / 43K children, ratio 1024 — children dominant
shape = "carrier"

[entity.shape_aspect_relationship]         # 2K self / 41 children, ratio 0.020 — parent dominant
shape = "base_parallel"

