# 13 ConcreteSupertype entities — IR shape decision per Plan 3c.
#
# Shape options:
#   - shape = "carrier"        : enum E { Itself(EData), ChildA(...), ... }
#                                parent and children are equal-rank variants.
#   - shape = "base_parallel"  : struct E { ... } + enum EKind { ... }
#                                parent struct primary, kind enum is auxiliary axis.
#
# Counts in trailing comments are corpus instance counts at the time of
# initial decision (geometry-biased fixtures). Re-evaluate ratios after
# fixtures expansion. Children count = sum of instance_count over all
# entities whose VariantSpec is InEnum { enum_name = <this entity> }.

[entity.characterized_object]              # 90 self / 621 children, ratio 6.9
shape = "carrier"

[entity.face_bound]                        # 1.1M self / 3.6M children, ratio 3.3
shape = "carrier"

[entity.face_surface]                      # 495K self / 3.4M children, ratio 6.9
# step-io 매칭: parent attr (face_geometry, bounds) 가 모든 face variant
# 에서 빈번히 직접 접근 — Carrier 의 enum match 보다 BaseParallel 의
# struct field 가 API 친화. ratio 통계 (6.9) 의 default 결정과 사용자
# 디자인 선호의 불일치 자리 — override 의 본래 목적.
shape = "base_parallel"

[entity.manifold_solid_brep]               # 105K self / 759 children, ratio 0.0072 — parent dominant
shape = "base_parallel"

[entity.mapped_item]                       # 900 self / 0 children — children 미등장
shape = "carrier"

[entity.product_category]                  # 10K self / 195K children, ratio 19.4
shape = "carrier"

[entity.product_context]                   # 53K self / 13 children, ratio ~0 — parent overwhelms
shape = "base_parallel"

[entity.product_definition_context]        # 53K self / 11 children, ratio ~0 — parent overwhelms
shape = "base_parallel"

[entity.presentation_style_assignment]     # 4.2M self / 0 children — children 미등장
shape = "carrier"

[entity.product_definition_formation]      # 43K self / 152K children, ratio 3.5
shape = "carrier"

[entity.property_definition_representation] # 2K self / 195K children, ratio 87.6
shape = "carrier"

[entity.representation_context]            # 96K self / 191K children, ratio 1.99
shape = "carrier"

[entity.representation_map]                # 882 self / 0 children — children 미등장
shape = "carrier"

[entity.representation_relationship]       # 42 self / 43K children, ratio 1024 — children dominant
shape = "carrier"

[entity.shape_aspect_relationship]         # 2K self / 41 children, ratio 0.020 — parent dominant
shape = "base_parallel"

[entity.styled_item]                       # 4M self / 25 children, ratio ~0 — parent dominant
shape = "base_parallel"

# Plan 3.23 / 3.24 — supertypes surfaced by the auto-keep rule. Shape
# chosen by ratio: parent dominant (self >> children) → base_parallel;
# children dominant or self=0 with live children → carrier.

# self=0 + live children — carrier (children dominant by default)
[entity.address]                           # 0 self / live children
shape = "carrier"

[entity.planar_extent]                     # 0 self / live children
shape = "carrier"

[entity.product_definition_relationship]   # 0 self / 3 children
shape = "carrier"

[entity.surface_style_rendering]           # 0 self / 1 child (988K)
shape = "carrier"

[entity.text_style]                        # 0 self / 116 children
shape = "carrier"

# Plan 3.26 — prune.rs 가 self-live 이지만 *살아남는 InEnum child 없는*
# ConcreteSupertype 을 SingleStruct 로 자동 변환. 따라서 0-child parent
# dominant 자리는 shape 결정이 필요 없어 shapes.toml entry 도 사라짐.
# 남는 entries 는 *살아남는 child 가 1개 이상* 인 경우만.

[entity.document]                          # 67 self / 129 children, ratio 1.93 — children dominant
shape = "carrier"

# pcurve: 69K self. bounded_pcurve (corpus 0) 가 prune_overrides 로 보존되어
# InEnum child 로 살아남음 → SingleStruct 자동 변환 대상 아님. recasts.
# parameter_space_unification 으로 IR 에서는 InEnum 으로 재구성됨.
[entity.pcurve]
shape = "carrier"

# variants_overrides → ConcreteSupertype 으로 재분류된 entity
# product_definition: 살아남는 child product_definition_with_associated_documents
# (43 instances) 가 있어 SingleStruct 자동 변환 대상 아님.
[entity.product_definition]                # 216K self / 43 children
shape = "base_parallel"
