# Manually authored — entity-level VariantSpec override.
# Use when the automatic variant classification (variant.rs) lands on
# a shape that doesn't match the entity's actual IR role.

# Plan 3.23 — auto-classified as EnumBase because the entity has
# SUPERTYPE OF (...). Variants (children) all have corpus 0, but the
# supertype itself has substantial corpus instances and is a primary
# entity in its own right. Re-classify as ConcreteSupertype so it
# survives reshape's empty-enum_base cleanup and carries its own
# struct in the IR blueprint.

[entity.geometric_representation_context]
kind = "concrete_supertype"
reason = "230,734 corpus instances. Unit context gateway in step-io; the EnumBase children (geometric_representation_context_with_parameter etc.) all have corpus 0. Plan 3.26 prune-stage specialization then re-classifies it to SingleStruct because no InEnum child survives — this override only ensures the entity is not dropped as an empty EnumBase first."

[entity.product_definition]
kind = "concrete_supertype"
reason = "216,632 corpus instances. Central entity in every assembly chain; most EnumBase children (mechanical / electronic variants) have corpus 0, but product_definition_with_associated_documents (43 corpus) survives, so the Plan 3.26 prune-stage specialization keeps it as ConcreteSupertype."

[entity.group]
kind = "concrete_supertype"
reason = "5,793 corpus instances. AP242 alone declares group as SUPERTYPE OF (ONEOF (change_group, change_element)), the other three schemas (AP203 / AP203e2 / AP214e3) declare plain ENTITY group; — the 4-schema unification keeps AP242's ONEOF, which triggers variant.rs Rule 2 to misclassify as EnumBase. AP242's group is also NOT abstract and has own_attrs (name, description) — plain GROUP(...) instances are valid per EXPRESS semantics and corpus confirms 5,793 of them. AGA / ACA point assigned_group / assigned_class at plain GROUP. Same pattern as geometric_representation_context / product_definition. Plan 3.26 prune-stage specialization then collapses it to SingleStruct because all 16 declared variants have corpus 0."

[entity.derived_unit]
kind = "concrete_supertype"
reason = "5,022 corpus instances. AP242 / AP203e2 / AP214e3 declare derived_unit as SUPERTYPE OF (ONEOF (area_unit, volume_unit, ...)), non-abstract, with own_attr elements : SET[1:?] OF derived_unit_element. The ONEOF children (area_unit/volume_unit etc.) are multi-inherited from named_unit and classified as InEnum of named_unit, so derived_unit has 0 live InEnum children of its own — prune_empty_enum_bases drops it. Override forces ConcreteSupertype; Plan 3.26 prune-stage specialization then collapses to SingleStruct. Same pattern as group / grc / pd."

[entity.descriptive_representation_item]
kind = "concrete_supertype"
reason = "6,734 corpus instances. AP242 / AP203e2 declare as SUPERTYPE OF (ONEOF (tagged_text_item, uniform_resource_identifier)), non-abstract, with own_attr description : text. Both ONEOF children have corpus 0 → pruned → no live InEnum children → prune_empty_enum_bases drops. Plan 3.26 will specialize to SingleStruct. Same pattern as group."

[entity.dimensional_size]
kind = "concrete_supertype"
reason = "212 corpus instances. AP242 declares as SUPERTYPE OF (ONEOF (angular_size, dimensional_size_with_path)), non-abstract, with own_attrs applies_to, name. angular_size has corpus 1 (live) so prune-stage specialization does NOT collapse to SingleStruct — stays ConcreteSupertype. shape decision: 212 self / 1 live child → parent-dominant → base_parallel."

[entity.compound_representation_item]
kind = "concrete_supertype"
reason = "7 corpus instances. AP242 declares as SUPERTYPE OF (ONEOF (point_and_vector, point_path) ANDOR ONEOF (row_representation_item, table_representation_item)), non-abstract, with own_attr item_element : compound_item_definition. All 4 ONEOF children have corpus 0 → no live InEnum children → Plan 3.26 specialization to SingleStruct. (NOTE: the ANDOR/ONEOF shape should plausibly match variant.rs Rule 1 ComplexSupertype but was classified as EnumBase — root cause TBD; override bypasses the misclassification.)"

# Plan 3.31 — e1 vs e2+ parent declaration conflict. AP203 e1 declares
# these as SUBTYPE OF (named_unit) but AP203e2 / AP214e3 / AP242 declare
# SUBTYPE OF (derived_unit). 4-schema unification picks named_unit as
# the enum_root. Corpus only uses the derived_unit pattern
# (AREA_UNIT((#elem)) set form), so force InEnum to derived_unit.
# Conflict scope verified: across the 4 schemas the parent-declaration
# mismatch is exactly these 2 entities, so override at this granularity
# is the correct fix rather than a unification-policy change.

[entity.area_unit]
kind = "in_enum"
enum_name = "derived_unit"
reason = "17 corpus instances, all derived_unit pattern (AREA_UNIT((#derived_unit_element)) set form in AP203e2/AP242 files; no AREA_UNIT instances found in AP203 e1 / AP214 file samples). variant.rs:enclosing_enum_root picked named_unit due to e1's SUBTYPE OF (named_unit) declaration. Force InEnum to derived_unit to match corpus reality."

[entity.volume_unit]
kind = "in_enum"
enum_name = "derived_unit"
reason = "13 corpus instances, same situation as area_unit — AP203 e1 named_unit subtype vs e2+ derived_unit subtype. Corpus uses derived_unit pattern only."

[entity.datum_feature]
kind = "concrete_supertype"
reason = "102 corpus instances. AP242 declares datum_feature SUPERTYPE OF (ONEOF (dimensional_location_with_datum_feature, dimensional_size_with_datum_feature)); AP203e2 / AP214e3 declare plain SUBTYPE OF (shape_aspect). 4-schema unification keeps AP242's ONEOF, so variant.rs Rule 2 misclassifies as enum_base. Only one child (dimensional_size_with_datum_feature, corpus 2) is live, so reshape's collapse_single_child_enum_bases collapses datum_feature away — the 102 plain DATUM_FEATURE instances lose their IR entry. datum_feature is non-abstract with no own attrs (name/description/of_shape/product_definitional all inherited from shape_aspect). NIST geometric_tolerance.toleranced_shape_aspect points at DATUM_FEATURE instances. Same root pattern as group / derived_unit."

[entity.shape_aspect]
kind = "concrete_supertype"
reason = "3,320 corpus instances. AP203 / AP203e2 / AP214e3 declare plain ENTITY shape_aspect; AP242 alone adds SUPERTYPE OF (ONEOF (6 children)). 4-schema unification keeps AP242's ONEOF, so variant.rs Rule 2 misclassifies as enum_base — which has no struct (has_type/has_fields=false), so the 3,320 plain SHAPE_ASPECT instances cannot be represented. shape_aspect is non-abstract with own attrs name/description/of_shape/product_definitional. Live in_enum children (datum_system/datum_target/tolerance_zone/placed_datum_target_feature) keep it ConcreteSupertype past prune. Same root pattern as group / derived_unit / datum_feature."
