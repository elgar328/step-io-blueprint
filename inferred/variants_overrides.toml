# Manually authored — entity-level VariantSpec override.
# Use when the automatic variant classification (variant.rs) lands on
# a shape that doesn't match the entity's actual IR role.

# Plan 3.23 — auto-classified as EnumBase because the entity has
# SUPERTYPE OF (...). Variants (children) all have corpus 0, but the
# supertype itself has substantial corpus instances and is a primary
# entity in its own right. Re-classify as ConcreteSupertype so it
# survives reshape's empty-enum_base cleanup and carries its own
# struct in the IR blueprint.

[entity.geometric_representation_context]
kind = "concrete_supertype"
reason = "230,734 corpus instances. Unit context gateway in step-io; the EnumBase children (geometric_representation_context_with_parameter etc.) all have corpus 0. Plan 3.26 prune-stage specialization then re-classifies it to SingleStruct because no InEnum child survives — this override only ensures the entity is not dropped as an empty EnumBase first."

[entity.product_definition]
kind = "concrete_supertype"
reason = "216,632 corpus instances. Central entity in every assembly chain; most EnumBase children (mechanical / electronic variants) have corpus 0, but product_definition_with_associated_documents (43 corpus) survives, so the Plan 3.26 prune-stage specialization keeps it as ConcreteSupertype."
