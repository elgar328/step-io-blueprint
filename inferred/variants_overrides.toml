# Manually authored — entity-level VariantSpec override.
# Use when the automatic variant classification (variant.rs) lands on
# a shape that doesn't match the entity's actual IR role.
#
# NOTE: the "non-abstract supertype with STANDALONE corpus instances
# misclassified as EnumBase" pattern (formerly Plan 3.23/3.26/3.38 — group,
# product_definition, shape_aspect, datum_feature, dimensional_size,
# descriptive_representation_item, property_definition, derived_unit) is now
# handled generically by prune.rs corpus-recovery (self-STANDALONE > 0 EnumBase
# -> ConcreteSupertype / SingleStruct), so those per-entity overrides were
# removed. EnumBase only loses a struct when the entity is directly
# instantiated standalone (#N=NAME(...)), which the corpus standalone count
# (instance_count - complex_part_count) detects. Entities that appear ONLY as
# complex-MI parts but still carry their own field data (geometric_
# representation_context below) are a separate class the corpus-recovery rule
# does not cover, and keep their override.
#
# The prune middle-node flatten (instantiated supertype nested in another enum
# -> flat InEnum) further subsumes the instantiated-middle-node overrides:
# compound_representation_item's override was removed since flatten demotes it
# to InEnum of representation_item regardless of its variant-stage shape.

[entity.geometric_representation_context]
kind = "concrete_supertype"
reason = "230,707 corpus instances, ALL as complex-MI parts (#N=(GEOMETRIC_REPRESENTATION_CONTEXT(dim) GLOBAL_UNIT_ASSIGNED_CONTEXT(...) ...)); standalone count is 0. The complex part carries its own data (coordinate_space_dimension), so it needs a struct — but prune.rs corpus-recovery keys on STANDALONE count and so leaves it EnumBase. Override forces ConcreteSupertype; prune-stage specialization then collapses to SingleStruct (all InEnum children corpus 0). Unlike curve/surface (also complex-part-only) this entity's part is non-empty, so the override is required until corpus-recovery is extended to complex-part-with-data entities."

# AP242 e2/e3 only. SUPERTYPE OF (product_definition_specified_occurrence
# ANDOR product_definition_occurrence_reference_with_local_representation) —
# a bare top-level ANDOR with no ONEOF wrapper, so neither ComplexSupertype
# nor CompositeOneOf (both require a ONEOF) fits, and Rule 8 raises it
# unresolved. Same shape class as compound_representation_item; the proper fix
# is a variant.rs rule for bare-ANDOR supertypes (follow-up). corpus 0, pruned.
[entity.product_definition_occurrence]
kind = "concrete_supertype"
reason = "0 corpus instances (AP242 e2/e3 model-based occurrence entity). SUPERTYPE OF (A ANDOR B), non-abstract, own attrs id/name/description/definition/quantity. Bare ANDOR without ONEOF -> Rule 8 unresolved. Pruned (corpus 0)."

# Plan 3.31 — e1 vs e2+ parent declaration conflict. AP203 e1 declares
# these as SUBTYPE OF (named_unit) but AP203e2 / AP214e3 / AP242 declare
# SUBTYPE OF (derived_unit). 4-schema unification picks named_unit as
# the enum_root. Corpus only uses the derived_unit pattern
# (AREA_UNIT((#elem)) set form), so force InEnum to derived_unit.
# Conflict scope verified: across the 4 schemas the parent-declaration
# mismatch is exactly these 2 entities, so override at this granularity
# is the correct fix rather than a unification-policy change.

[entity.area_unit]
kind = "in_enum"
enum_name = "derived_unit"
reason = "17 corpus instances, all derived_unit pattern (AREA_UNIT((#derived_unit_element)) set form in AP203e2/AP242 files; no AREA_UNIT instances found in AP203 e1 / AP214 file samples). variant.rs:enclosing_enum_root picked named_unit due to e1's SUBTYPE OF (named_unit) declaration. Force InEnum to derived_unit to match corpus reality."

[entity.volume_unit]
kind = "in_enum"
enum_name = "derived_unit"
reason = "13 corpus instances, same situation as area_unit — AP203 e1 named_unit subtype vs e2+ derived_unit subtype. Corpus uses derived_unit pattern only."
