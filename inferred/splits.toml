# Manually authored — 1 schema entity → N IR type splits.
# Each split entry produces virtual entities the rest of the pipeline
# treats as siblings. Empty file is valid (no splits).
#
# `reasons` (optional, per entry) — *왜 이 추상화가 schema 1:1 보다
# 나은 IR 디자인인지* 의 근거. ir.toml 의 primary entity 에 propagate.
# Per-variant `kind` / `enum_of` (optional) — source 의 VariantSpec 을
# 분기별로 override (예: standalone 으로 끄집어내기).

[split.cartesian_point]
context_signal = "representation_context.dimensionality"
reasons = """
PCURVE 컨텍스트의 2D 점은 *별 type 분리* 가 IR 측면에서 적절. schema 1:1
분류는 모든 점을 f64;3 으로 padding 해 2D 점 메모리 33% 낭비 + 컴파일타임
2D/3D 혼동 위험. Point3 / Point2 로 분리 시 dimensionality 가 type 시스템
보장 + arena 분리로 cache locality / alloc 패턴 단순. round-trip 시
representation_context.dimensionality 로 schema 의 cartesian_point 1
entity 로 emit — step-io codegen 책임.
"""
variants = [
  { name = "cartesian_point", suffix = "3d", arena = "cartesian_point" },
  { name = "cartesian_point_2d", suffix = "2d", arena = "cartesian_point_2d" },
]

[split.direction]
context_signal = "representation_context.dimensionality"
reasons = """
2D direction (PCURVE 컨텍스트) 은 의미적으로 별 type. schema 의 direction
은 InEnum (geometric_representation_item) — *3D 도메인의 polymorphic root*.
2D 분기를 동일 enum 의 멤버로 두면 *2D 가 3D enum 안에 사는* 의미적 모순
+ pattern match 로 2D 케이스 처리하는 사용자 코드 강제. Direction2 standalone
struct 로 끄집어내 (kind = "single_struct" override) 별 type — 3D enum 은
그대로, 2D 는 PCURVE 자료구조 안에서만 등장. round-trip 시 컨텍스트로
emit 결정.
"""
variants = [
  { name = "direction", suffix = "3d", arena = "direction" },
  { name = "direction_2d", suffix = "2d", arena = "direction_2d", kind = "single_struct" },
]
