# Manually authored — schema 외부의 IR EnumBase anchor 선언
# (4번째 reshape 추상화: anchor, 0 → 1).
#
# 현 reshape 의 split (1→N), merge (N→1), recast (1→1 reclassification)
# 와 직교. anchor 는 EXPRESS schema 에 *없는* IR enum_base 를 추가해,
# 후속 recasts 가 `enum_of = <anchor_name>` 으로 children 을 흡수.
#
# Empty file is valid (no anchors → ir.toml 무변동).

[anchor.parameter_space_curve]
arena = "pcurve"
kind = "enum_base"
reasons = """
pcurve / bounded_pcurve 는 *surface 의 UV parameter space 안의 2D curve*
— 3D 공간 curve 와 의미적으로 다른 부류. schema 에는 그룹화 없음
(pcurve = SUBTYPE OF curve, bounded_pcurve = SUBTYPE OF (pcurve,
bounded_curve)) 이지만 IR 측면에서 *ParameterSpaceCurve* enum 으로 묶는
것이 의미 명확. curve enum 으로 흡수하지 않는 이유: 2D parameter-space
와 3D 공간 curve 가 수치/연산 양식 다름 (좌표계, 정의역, 연결된
surface).
"""
