    "kinematic_topology_structure", "kinematic_topology_substructure",
    "kinematic_topology_directed_structure",
    "kinematic_topology_network_structure",
    "kinematic_topology_tree_structure",
]
# cartesian_transformation_operator 는 item_defined_transformation 의 다중상속
# 자손이지만 의미상 geometry_3d (전역 transform). draped/laid 는 composite ply
# 영역, transformation_with_derived_angle 은 generic 변환.
