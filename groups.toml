[[group]]
name = "topology"
description = "Vertices, edges, face bounds, faces, shells, solids (BREP)"
patterns = [
    "vertex_*", "edge_*", "oriented_*",
    "*_loop", "face_*", "*_face*",
    "*_shell*", "*brep*",
    "manifold_solid_brep", "brep_with_voids",
    "manifold_*", "shell_based_*",
    "connected_*",
]
# solid_model root 추가: manifold_solid_brep / brep_with_voids 가 topology 영역
# (csg_primitives 가 csg_*solid + swept_*_solid 매칭, modified_solid 자손은
# manufacturing_features 매칭).
root_supertypes = ["topological_representation_item", "solid_model"]
# csg_solid 자손 + modified_solid 자손 + swept_*_solid 는 다른 group 의
# root match 가 우선. exclude 명시. 이제 entity name 자기 자신도 exclude
# 검사에 포함되므로 modified_solid / swept_*_solid 자체도 push-out 됨.
exclude_root = [
    "csg_primitive", "csg_solid",
    "modified_solid", "edge_blended_solid",
    "solid_with_shape_element_pattern", "solid_with_protrusion",
    "solid_with_depression", "solid_with_pocket",
    "solid_with_chamfered_edges", "solid_with_groove", "solid_with_slot",
    "solid_with_through_depression",
    "solid_replica",
    "swept_face_solid", "swept_area_solid", "swept_disk_solid",
]

