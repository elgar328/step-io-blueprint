    "simple_pair_range", "pair_value",
    "mechanism", "pair_actuator", "initial_state",
    "interpolated_configuration_sequence",
    "rotation_about_direction",
    "kinematic_joint",
    "kinematic_link",
    "kinematic_structure",
    "kinematic_analysis_consistency",
    "kinematic_analysis_result",
    "kinematic_control",
    "kinematic_link_representation_relation",
    "context_dependent_kinematic_link_representation",
    "item_defined_transformation",
    "functionally_defined_transformation",
    # founded_item descendants used as kinematic motion paths
    "circular_path", "linear_path", "point_to_point_path",
    "curve_based_path", "curve_based_path_with_orientation",
    "curve_based_path_with_orientation_and_parameters",
    "kinematic_path_segment", "path_node",
    "interpolated_configuration_segment",
