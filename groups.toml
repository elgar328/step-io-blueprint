    "weld_*", "bead*", "boss", "hole_*", "*_hole", "rib_*",
    "barring_hole", "circular_pattern", "compound_feature",
    "solid_with_*", "modified_*", "*_blended_solid",
    "shelled_solid", "complex_shelled_solid", "double_offset_shelled_solid",
    "sculptured_solid", "track_blended_*",
    "feature_definition*", "feature_pattern", "feature_in_panel",
    "feature_component_definition",
    "shape_feature_definition",
    "instanced_feature", "general_feature", "replicate_feature",
    "joggle", "locator", "marking", "thread", "pocket", "slot", "step",
    "fillet", "chamfer", "round_hole", "composite_hole",
    "rectangular_pattern", "modified_pattern", "removal_volume",
    "outer_round", "outside_profile", "rounded_end", "rib_top",
    "spherical_cap", "turned_knurl", "extent", "flat_face",
    "protrusion", "gear",
]
