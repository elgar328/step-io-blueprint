# Group definitions — iterative refinement (final).
#
# Each [[group]] defines:
#   - name             : snake_case identifier (Rust module path / 디렉토리)
#   - description      : 1-line semantic
#   - patterns         : glob-like name matchers (`*` wildcard)
#   - root_supertypes  : SUBTYPE chain root that this group claims (entity
#                        itself, its root, or any ancestor matches)
#   - exclude_root     : sub-trees to push out (entity itself / root /
#                        ancestor match all subtract from the claim)
#
# Classifier 우선순위:
#   1. SUBTYPE root match (semantic) — 1순위
#   2. Name pattern match (syntactic) — 2순위
#   3. 충돌 또는 모호 → confidence = low, 수동 검토
#
# Iterative refinement: 이 file 만 수정하고 catalog 재실행 (코드 변경 X).
#
# 매칭 순서 = 이 file 의 group 정의 순서. specific group (root 좁음) 을 먼저,
# generic catch-all (geometry_3d 의 representation_item 같은) 을 뒤로.

# ─────────────────────────────────────────────────────────────
# 1. Specific roots — domain-narrow, 가장 먼저 매칭
# ─────────────────────────────────────────────────────────────

[[group]]
name = "units"
description = "SI / CBU unit leaves, dimensional exponents, derived units"
patterns = [
    "*_unit", "named_unit", "si_unit", "conversion_based_unit", "uncertainty_*",
    "dimensional_exponents", "derived_unit_element",
]
root_supertypes = ["named_unit", "dimensional_exponents", "derived_unit_element"]
exclude_root = []

[[group]]
name = "tessellation"
description = "Triangulated / tessellated surface mesh"
patterns = [
    "tessellated_*", "*_triangulated*", "triangulated_*",
    "complex_triangulated_*", "coordinates_list",
    "repositioned_tessellated_*",
]
root_supertypes = ["tessellated_item"]
exclude_root = []

