]
exclude_root = []

[[group]]
name = "param_expr"
description = "Parametric expression / formula entities (mostly numeric and functional)"
patterns = [
    "*_expression*", "*_function*", "*_variable*",
    "binary_*", "unary_*", "boolean_*",
    "*_literal", "*_environment", "comparison_*", "expression",
    "variable_semantics", "atomic_formula",
    "*_clause", "complex_*_clause",
    "expression_extension*", "environment",
]
root_supertypes = [
    "expression", "generic_expression", "variable_semantics", "atomic_formula",
    "environment", "expression_extension_to_select",
    # simple_clause / complex_clause 자손 — compound_representation_item 자손이라
    # geometry_3d 가 흡수. clauses 는 param_expr 도메인.
    "simple_clause", "complex_clause",
]
exclude_root = []

[[group]]
name = "csg_primitives"
description = "Constructive solid geometry primitives (Block, Sphere, Cylinder, Cone, Torus, ...)"
patterns = [
    "block", "right_*_cone", "right_*_cylinder", "right_*_pyramid",
    "sphere", "ellipsoid", "torus", "eccentric_cone",
    "rectangular_pyramid", "cyclide", "swept_*_solid",
    "csg_*", "boolean_result", "half_space_*",
    "extruded_*", "revolved_*",
]
# csg_solid (solid_model wrapper around csg_primitive tree) + swept_*_solid
# (parametric primitives 와 같은 family) 도 여기 포함.
# csg_primitive 는 SELECT type 이라 block / sphere / cylinder 등은 SUBTYPE 이
# 아니므로 entity name 별로 직접 root 청구 필요.
root_supertypes = [
    "csg_primitive",
    "csg_solid",
    "swept_area_solid", "swept_disk_solid", "swept_face_solid",
    "block", "sphere", "ellipsoid", "torus",
    "rectangular_pyramid", "eccentric_cone",
    "right_circular_cone", "right_circular_cylinder", "right_angular_wedge",
    "half_space_solid", "half_space_2d", "boxed_half_space",
    "boolean_result",
]
exclude_root = ["manifold_solid_brep", "brep_with_voids", "shell_based_surface_model"]

