    "currency*", "*_currency*",
    "coordinated_universal_time_offset",
    "*_assignment", "*_role",
    "attribute_*",
    # material 흡수 (metadata 의 product attribution)
    "material_*", "*_material*", "product_material*", "composite_material_*",
]
root_supertypes = [
    "contract", "contract_assignment", "contract_relationship", "contract_type",
    "approval", "approval_assignment", "approval_relationship", "approval_status",
    "certification_assignment", "certification_type",
    "classification_assignment", "classification_role",
    "document_reference", "document_relationship", "document_type",
    "person_and_organization_assignment", "date_and_time_assignment",
    "security_classification_assignment",
    "address",
    "external_source",
    "attribute_classification_assignment", "attribute_value_assignment", "attribute_value_role",
    "language_indication",
    "date", "year_month", "calendar_date",
    "role_association",
    "area_in_set", "drawing_sheet_revision_usage",
    # material 흡수
    "material_designation",
    # `applied_*_assignment` chain → metadata via root assignment types
    "date_assignment",
    "identification_assignment",
    "name_assignment",
    "organization_assignment",
    "organizational_project_assignment",
    "time_interval_assignment",
    "document_usage_constraint_assignment",
    # document tree
    "document",
    # document_identifier (group descendant) 는 의미상 metadata
    "document_identifier", "document_identifier_assignment",
    # date_time_representation_item — date_and_time 다중상속, 의미는 metadata
    "date_time_representation_item",
]
exclude_root = []

# ─────────────────────────────────────────────────────────────
# 2. Generic catch-alls (assembly_product, geometry_3d) — last
# ─────────────────────────────────────────────────────────────

[[group]]
name = "assembly_product"
description = "PRODUCT chain, definitions, assemblies, transforms, application context"
patterns = [
    "product*", "*product_*",
    "*_definition*", "*_formation*",
    "next_assembly_usage_occurrence", "context_dependent_*",
    "item_defined_transformation",
    "*_category*",
    "*application_context*",
    "assembly_*", "*_assembly*",
    "breakdown_*", "*_breakdown*",
    "group", "*_group", "group_*", "group_assignment",
    "class", "class_*", "*_class",
    "category_*", "characteristic_*",
    "concept_*",
]
root_supertypes = [
    "product_definition", "product_definition_relationship", "product_definition_context",
    "assembly_component_usage", "assembly_component_usage_substitute",
    "group", "group_assignment", "group_relationship",
    "concept_feature_operator", "concept_feature_relationship",
    "product_concept_feature",
    "product_concept",
    "characterized_class",
    "characterized_chain_based_item_within_representation",
    "characterized_item_within_representation",
    "breakdown_element_realization",
    "application_context_element",
    "item_identified_representation_usage",
    "requirement_assignment",
]
exclude_root = []

[[group]]
name = "geometry_3d"
description = "3D points, directions, vectors, axis placements, curves, surfaces"
patterns = [
    "cartesian_point", "direction", "vector",
    "axis*_placement_*",
    "*_curve*", "*_surface*",
    "line", "circle", "ellipse", "plane",
    "*_spline_*",
    "compound_representation_item",
    "bytes_representation_item",
    "cartesian_transformation_operator*",
    "transformation_with_derived_angle",
    "draped_defined_transformation",
    "laid_defined_transformation",
]
# Catch-all for representation_item subtrees not claimed by more specific groups above.
root_supertypes = [
    "geometric_representation_item", "representation_item",
    # founded_item descendants used as geometry primitives (not styles)
    "box_domain", "surface_patch",
    "b_spline_curve_segment", "b_spline_curve_knot_locator",
    "b_spline_surface_patch", "b_spline_surface_strip",
    "b_spline_surface_knot_locator",
    "boundary_curve_of_b_spline_or_rectangular_composite_surface",
    "composite_curve_segment", "composite_curve_transition_locator",
    "rectangular_composite_surface_transition_locator",
    "reparametrised_composite_curve_segment",
    "plane_angle_and_length_pair", "plane_angle_and_ratio_pair",
    # approximation tolerance (numeric quality)
    "approximation_tolerance",
    "approximation_tolerance_deviation",
    "approximation_tolerance_parameter",
]
# Push out subtrees that other groups handle.
exclude_root = [
    "shape_aspect",
    "draughting_callout",
    "styled_item",
    "presentation_style_assignment",
    # founded_item 은 visualization (style 자손) + geometry_3d (segment / patch /
    # box / approximation) 양쪽에서 claim. visualization 의 exclude_root 가
    # geometry 영역을 push-out 하므로 visualization 이 먼저 style 자손을 잡고
    # 남은 founded_item 자손은 geometry_3d 의 catch-all 로.
    "colour",
    "presentation_layer_assignment",
    "tessellated_item",
    "expression", "generic_expression", "variable_semantics", "atomic_formula",
    "property_definition", "general_property",
    "uncertainty_qualifier",
    "characterized_object",
    "solid_model", "csg_primitive",
    "topological_representation_item",
    "named_unit",
    "annotation_curve_occurrence",
]
