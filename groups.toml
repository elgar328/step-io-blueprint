    "cartesian_transformation_operator",
    "cartesian_transformation_operator_2d",
    "cartesian_transformation_operator_3d",
    "transformation_with_derived_angle",
    "draped_defined_transformation",
    "laid_defined_transformation",
]

[[group]]
name = "manufacturing_features"
description = "Manufacturing features: solid_with_*, modified_solid tree, characterized_object features (hole, slot, pocket, bead, boss, rib)"
